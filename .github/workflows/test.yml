name: Build Createblock

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o createblock.zip -d extracted
          echo "--- extracted tree ---"
          find extracted -maxdepth 2

      - name: Find project root
        id: findroot
        run: |
          ROOT=$(dirname "$(find extracted -name 'build.gradle' | head -1)")
          echo "root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root is: $ROOT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip -d $HOME
          echo "$HOME/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build
        working-directory: ${{ steps.findroot.outputs.root }}
        continue-on-error: true
        run: gradle build --no-daemon --stacktrace 2>&1 | tee build-output.txt

      - name: Show errors
        if: always()
        working-directory: ${{ steps.findroot.outputs.root }}
        run: |
          echo "=================== ERRORS ==================="
          grep -E "error:|FAILED|Caused by|Could not|cannot find|Unresolved" build-output.txt || echo "no error lines matched"
          echo ""
          echo "=================== LAST 80 LINES ==================="
          tail -80 build-output.txt

      - name: Upload the jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: createblock-mod-jar
          path: ${{ steps.findroot.outputs.root }}/build/libs/*.jar
          retention-days: 30
