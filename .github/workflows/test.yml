name: Build Createblock

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o createblock.zip -d extracted
          find extracted -maxdepth 2

      - name: Find project root
        id: findroot
        run: |
          ROOT=$(dirname "$(find extracted -name 'build.gradle' | head -1)")
          echo "root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root is: $ROOT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip -d $HOME
          echo "$HOME/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build
        working-directory: ${{ steps.findroot.outputs.root }}
        run: gradle build --no-daemon --stacktrace

      - name: List what got built
        if: always()
        working-directory: ${{ steps.findroot.outputs.root }}
        run: |
          echo "=== build/libs contents ==="
          ls -la build/libs/ || echo "no build/libs folder"

      - name: Upload the jar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: createblock-mod-jar
          path: ${{ steps.findroot.outputs.root }}/build/libs/*.jar
          if-no-files-found: warn
          retention-days: 30
