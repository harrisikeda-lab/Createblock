name: Compile Mod

on:
  push:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o createblock.zip -d extracted
          echo "--- extracted tree ---"
          find extracted -maxdepth 2

      - name: Find project root
        id: findroot
        run: |
          ROOT=$(dirname "$(find extracted -name 'build.gradle' | head -1)")
          echo "root=$ROOT" >> $GITHUB_OUTPUT
          echo "Project root is: $ROOT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install Gradle directly - NO setup-gradle action, NO cache service.
      # This is what avoids the "Our services aren't available" noise.
      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip -d $HOME
          echo "$HOME/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          java -version
          $HOME/gradle-8.1.1/bin/gradle -v

      # Capture EVERYTHING to a file so we can print the real errors after.
      - name: Compile
        id: compile
        continue-on-error: true
        working-directory: ${{ steps.findroot.outputs.root }}
        run: |
          set -o pipefail
          gradle build --no-daemon --stacktrace 2>&1 | tee /tmp/build-output.txt

      # THIS is the important step - it prints the actual compile errors.
      - name: SHOW THE ERRORS
        if: always()
        run: |
          echo "############################################"
          echo "############   COMPILE ERRORS   ############"
          echo "############################################"
          grep -nE "error:|error;|FAILED|Caused by:|cannot find symbol|Unresolved reference|Could not resolve|does not exist|incompatible types" /tmp/build-output.txt || echo "(no matching error lines)"
          echo ""
          echo "############################################"
          echo "############   LAST 100 LINES   ############"
          echo "############################################"
          tail -100 /tmp/build-output.txt

      - name: Find any jars
        if: always()
        run: |
          echo "=== jars found in workspace ==="
          find . -name "*.jar" -not -path "*/gradle-8.1.1/*" 2>/dev/null || echo "none"

      - name: Upload jar if it exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: createblock-jar
          path: '**/build/libs/*.jar'
          if-no-files-found: warn

      - name: Upload the full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build-output.txt
          if-no-files-found: warn
